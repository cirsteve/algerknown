version: '3.8'

services:
  rag-backend:
    build: .
    ports:
      - "4735:4735"
    volumes:
      # Mount content directory (read-write for ingest updates)
      - ../content-agn:/app/content-agn
      # Persist the jig memory store + feedback/trace SQLite files
      - ./memory_db:/app/memory_db
    environment:
      - CONTENT_DIR=/app/content-agn
      - MEMORY_DB_PATH=/app/memory_db/memory.db
      - FEEDBACK_DB_PATH=/app/memory_db/feedback.db
      - TRACE_DB_PATH=/app/memory_db/traces.db
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4735/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # First boot re-embeds ~50 documents; give lifespan enough time
      # before the orchestrator starts marking the service unhealthy.
      start_period: 120s
