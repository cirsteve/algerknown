name: CI

on:
  pull_request:
    branches: [main]

env:
  # No network provider calls: every test path that would otherwise reach a
  # real LLM provider is mocked; these are obviously-fake placeholders, not
  # real credentials, so any code path that skipped its mock and tried a
  # real request would fail loudly on auth rather than silently succeeding.
  OPENAI_API_KEY: test-key-not-a-real-key
  ANTHROPIC_API_KEY: test-key-not-a-real-key

jobs:
  governed-unit:
    name: governed-unit (TS build/test + backend conformance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Configure git identity for temporary test fixtures
        run: |
          git config --global user.email "ci@algerknown.dev"
          git config --global user.name "Algerknown CI"
          git config --global commit.gpgsign false
      - run: npm ci
      - run: npm run build --workspace=@algerknown/core
      - run: npm run build --workspace=@algerknown/governed
      - run: npm run test:phase2:rails
      - run: npm run test:phase2:conformance
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase2-evidence-governed-unit
          path: build/phase2-acceptance/evidence
          if-no-files-found: error
          retention-days: 7

  dossier-contract:
    name: dossier-contract (pinned content-agn conformance + schema parity)
    runs-on: ubuntu-latest
    steps:
      - name: Check out algerknown
        uses: actions/checkout@v4
        with:
          path: algerknown
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: algerknown/package-lock.json
      - name: Read the pinned content-agn repository, revision, and paths
        id: pin
        run: |
          node -e '
            const pin = require("./algerknown/packages/core/tests/conformance-corpus-revision.json");
            const fs = require("fs");
            fs.appendFileSync(process.env.GITHUB_OUTPUT,
              `repository=${pin.repository}\n` +
              `revision=${pin.revision.toLowerCase()}\n` +
              `corpus_path=${pin.corpus_path}\n`);
          '
      - name: Check out the pinned content-agn revision (immutable; not main, a tag, or a package)
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pin.outputs.repository }}
          ref: ${{ steps.pin.outputs.revision }}
          token: ${{ secrets.CONTENT_AGN_CHECKOUT_TOKEN }}
          path: content-agn-pinned
      - name: Verify the pinned checkout HEAD matches conformance-corpus-revision.json
        run: |
          set -e
          actual_head=$(git -C content-agn-pinned rev-parse HEAD | tr '[:upper:]' '[:lower:]')
          expected_head="${{ steps.pin.outputs.revision }}"
          if [ "$actual_head" != "$expected_head" ]; then
            echo "::error::pinned content-agn checkout HEAD $actual_head does not match conformance-corpus-revision.json revision $expected_head"
            exit 1
          fi
      - name: Install and build @algerknown/core
        working-directory: algerknown
        run: |
          npm ci
          npm run build --workspace=@algerknown/core
      - name: Run dossier-contract conformance + schema-parity tests (pinned, required)
        working-directory: algerknown
        env:
          CONFORMANCE_SOURCE_MODE: pinned
          CONFORMANCE_REQUIRED: "1"
          CONFORMANCE_CORPUS_DIR: ${{ github.workspace }}/content-agn-pinned/${{ steps.pin.outputs.corpus_path }}
        run: npm run test --workspace=@algerknown/core -- tests/conformance.test.ts tests/schema-parity.test.ts

  python-rag:
    name: python-rag (pytest, no provider calls)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Configure git identity for temporary test fixtures
        run: |
          git config --global user.email "ci@algerknown.dev"
          git config --global user.name "Algerknown CI"
          git config --global commit.gpgsign false
      - name: Install locked Python requirements
        working-directory: rag-backend
        run: pip install -r requirements.txt
      - name: Run pytest (mock embeddings, no Scout corpus, no provider access)
        working-directory: rag-backend
        env:
          USE_MOCK_EMBEDDINGS: "true"
        run: pytest tests/ -q

  web-cli:
    name: web-cli (build + client/CLI/HTTP-boundary tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Configure git identity for temporary test fixtures
        run: |
          git config --global user.email "ci@algerknown.dev"
          git config --global user.name "Algerknown CI"
          git config --global commit.gpgsign false
      - run: npm ci
      - run: npm run build --workspace=@algerknown/core
      - run: npm run build --workspace=@algerknown/governed
      - run: npm run build --workspace=@algerknown/cli --workspace=@algerknown/web
      - name: web client + governance HTTP + auth tests
        run: npm run test --workspace=@algerknown/web -- tests/client tests/governance tests/auth
      - name: CLI tests
        run: npm run test --workspace=@algerknown/cli
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase2-evidence-web-cli
          path: build/phase2-acceptance/evidence
          if-no-files-found: error
          retention-days: 7

  boundary-recovery:
    name: boundary-recovery (real subprocess restart + failpoints)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Configure git identity for temporary test fixtures
        run: |
          git config --global user.email "ci@algerknown.dev"
          git config --global user.name "Algerknown CI"
          git config --global commit.gpgsign false
      - run: npm ci
      - run: npm run build --workspace=@algerknown/core
      - run: npm run build --workspace=@algerknown/governed
      - run: npm run test:phase2:recovery
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase2-evidence-boundary-recovery
          path: build/phase2-acceptance/evidence
          if-no-files-found: error
          retention-days: 7

  phase2-e2e:
    name: phase2-e2e (Playwright demo + final acceptance report)
    runs-on: ubuntu-latest
    needs: [governed-unit, python-rag, web-cli, boundary-recovery]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Configure git identity for temporary test fixtures
        run: |
          git config --global user.email "ci@algerknown.dev"
          git config --global user.name "Algerknown CI"
          git config --global commit.gpgsign false
      - run: npm ci
      - run: npm run build --workspace=@algerknown/core
      - run: npm run build --workspace=@algerknown/governed
      - run: npm run build --workspace=@algerknown/cli --workspace=@algerknown/web
      - name: Install Playwright Chromium
        working-directory: packages/web
        run: npx playwright install --with-deps chromium
      - name: Download partial evidence from every earlier job
        uses: actions/download-artifact@v4
        with:
          pattern: phase2-evidence-*
          path: build/phase2-acceptance/evidence-partial
      - name: Merge partial evidence into one directory
        run: |
          mkdir -p build/phase2-acceptance/evidence
          find build/phase2-acceptance/evidence-partial -mindepth 2 -type f -name '*.json' -exec cp {} build/phase2-acceptance/evidence/ \;
      - name: Recorded Algerknown review session (Playwright) + demo artifact bundle
        run: npm run demo:phase2
      - name: Build and validate the final Phase 2 acceptance report (required: all 13 checks must pass)
        run: node scripts/governance/build-acceptance-report.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase2-acceptance-report
          path: build/phase2-acceptance/report.*
          retention-days: 30
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase2-governance-demo
          path: |
            build/phase2-demo/**
            !build/phase2-demo/*.sqlite
            !build/phase2-demo/governed.db
          retention-days: 30
