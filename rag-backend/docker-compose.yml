version: '3.8'

services:
  rag-backend:
    build: .
    ports:
      # Host-published port stays loopback-only; the container listens on
      # 0.0.0.0 below only because Docker's port publishing can't reach a
      # process bound to the container's own 127.0.0.1.
      - "127.0.0.1:4735:4735"
    volumes:
      # Mount content directory (read-write for ingest updates)
      - ../content-agn:/app/content-agn
      # Persist the jig memory / feedback / trace SQLite files
      - ./memory_db:/app/memory_db
    environment:
      - CONTENT_DIR=/app/content-agn
      - MEMORY_DB_PATH=/app/memory_db/memory.db
      - TRACER_DB_PATH=/app/memory_db/traces.db
      # Documented override of the image's loopback default (see
      # docs/springfield-deployment.md) - required for the host port
      # publish above to reach the container.
      - RAG_HOST=0.0.0.0
      # The governed write API (packages/web, port 2393) runs outside this
      # container. The image default targets the container's own loopback and
      # cannot reach it, so ingest-proposal persistence needs an explicit,
      # reachable URL. Set GOVERNANCE_API_URL in .env to the governance host
      # (e.g. http://willie:2393/api/governance); the host-gateway fallback
      # below covers a same-host deployment. GOVERNANCE_PROCESSOR_SECRET must
      # also be set in .env or generated candidates are skipped.
      - GOVERNANCE_API_URL=${GOVERNANCE_API_URL:-http://host.docker.internal:2393/api/governance}
    extra_hosts:
      # Lets host.docker.internal resolve to the host on Linux Docker.
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4735/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # First boot re-embeds ~50 documents from YAML into the fresh
      # SqliteStore; with OpenAI or local sentence-transformers this
      # takes 30–60s. A 10s start_period would flap the container.
      start_period: 120s
